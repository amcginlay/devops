apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana
  namespace: monitoring
spec:
  parentRefs:
    - name: default-gateway
      namespace: nginx-gateway
  hostnames:
    - "grafana.vm.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-grafana
          port: 80
