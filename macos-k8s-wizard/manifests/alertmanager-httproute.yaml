apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  parentRefs:
    - name: default-gateway
      namespace: nginx-gateway
  hostnames:
    - "alertmanager.vm.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-alertmanager
          port: 9093
