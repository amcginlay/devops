apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus
  namespace: monitoring
spec:
  parentRefs:
    - name: default-gateway
      namespace: nginx-gateway
  hostnames:
    - "prometheus.vm.local"
  rules:
    - backendRefs:
        - name: kube-prometheus-stack-prometheus
          port: 9090
