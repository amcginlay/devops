apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: wildcard-vm-local
  namespace: nginx-gateway
spec:
  secretName: wildcard-vm-local-tls
  issuerRef:
    name: selfsigned
    kind: ClusterIssuer
  dnsNames:
    - "*.vm.local"
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: default-gateway
  namespace: nginx-gateway
spec:
  gatewayClassName: nginx
  listeners:
    - name: https
      protocol: HTTPS
      port: 443
      tls:
        mode: Terminate
        certificateRefs:
          - name: wildcard-vm-local-tls
      allowedRoutes:
        namespaces:
          from: All
